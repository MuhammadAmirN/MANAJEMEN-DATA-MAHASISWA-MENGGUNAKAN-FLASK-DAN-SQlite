<!DOCTYPE html>
<html>
<head>
    <title>Edit Data Mahasiswa</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="form-card">
        <h1>Edit Data Mahasiswa</h1>

        <form method="POST" action="{{ url_for('edit', id=mahasiswa.id) }}">
            <div class="form-group">
                <label>Nama</label>
                <input type="text" name="nama" value="{{ mahasiswa.nama }}" required>
            </div>

            <div class="form-group">
                <label>NIM</label>
                <input type="text" name="nim" value="{{ mahasiswa.nim }}" required>
            </div>

            <div class="form-group">
                <label>Program Studi</label>
                <input type="text" name="prodi" value="{{ mahasiswa.prodi }}" required>
            </div>

            <div class="form-button">
                <a href="{{ url_for('index') }}" class="button button-red">Batal</a>
                <button type="submit" class="button button-blue">Update</button>
            </div>
        </form>
    </div>
</body>
</html>
